# ─────────────────────────────────────────────────────────────────
# 수집 소스
# ─────────────────────────────────────────────────────────────────
sources:
  naver:
    enabled:     true
    display:     "Naver News"
    api_base:    "https://openapi.naver.com/v1/search/news.json"
    daily_limit: 25000

  daum:
    enabled: true
    display: "Daum News"
    rss_feeds:
      - url:           "https://news.daum.net/rss/entertain"
        category_hint: "K-Drama"

# ─────────────────────────────────────────────────────────────────
# 알림 채널
# ─────────────────────────────────────────────────────────────────
notifications:
  email:
    provider: "buttondown"
    enabled:  true
  discord:
    enabled:  true
  twitter:
    enabled:  false          # v1.1에서 활성화
