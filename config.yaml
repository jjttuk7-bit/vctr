    bg:         "#6366F1"
    text:       "#ffffff"
    badge_bg:   "#EEF2FF"
    badge_text: "#4338CA"

  "AI Image":
    bg:         "#EC4899"
    text:       "#ffffff"
    badge_bg:   "#FDF2F8"
    badge_text: "#BE185D"

  "Productivity":
    bg:         "#10B981"
    text:       "#ffffff"
    badge_bg:   "#ECFDF5"
    badge_text: "#065F46"

  "Dev Tools":
    bg:         "#F59E0B"
    text:       "#ffffff"
    badge_bg:   "#FFFBEB"
    badge_text: "#92400E"

  "No-Code":
    bg:         "#3B82F6"
    text:       "#ffffff"
    badge_bg:   "#EFF6FF"
    badge_text: "#1D4ED8"

  "Marketing":
    bg:         "#EF4444"
