# ─────────────────────────────────────────────────────────────────
# 브랜드 코어 컬러
# CSS 변수·Tailwind 설정과 동기화 유지
# ─────────────────────────────────────────────────────────────────
brand_colors:
  indigo:       "#6366F1"
  indigo_light: "#818CF8"
  indigo_dark:  "#4338CA"
  near_black:   "#0A0A0F"
  near_black_2: "#1C1C28"
  surface:      "#F8FAFC"
  cyan:         "#22D3EE"

