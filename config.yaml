# KNow — config.yaml
# ⚠️  SSOT: 카테고리·키워드·컬러·이미지 키워드 모두 여기서만 정의한다.
#    코드·프롬프트에 하드코딩 금지. 변경 시 이 파일만 수정한다.
#    참조: KWAVE_DAILY_PLAN.md 2절 / 3.3절 / 4.4절 · BRANDING.md 3절 / 4절

# ─────────────────────────────────────────────────────────────────
# 사이트 메타
# ─────────────────────────────────────────────────────────────────
site:
  name: "KNow"
  slogan: "KNow Korea, before anyone else."
  description: "Your daily dose of K-beauty, K-drama, K-pop, K-food, K-fashion and more."
  url: "https://k-now.co"          # 도메인 확보 시 업데이트
  locale: "en"

# ─────────────────────────────────────────────────────────────────
# LLM 설정
# ─────────────────────────────────────────────────────────────────
llm:
  primary: "gpt-4o"
  fallback: "claude-3-5-sonnet-20241022"
  prompt_version: "v1.0"
  max_articles_per_category: 8     # 카테고리당 일 최대 기사 수 (과잉 수집 방지)
  min_body_length: 200             # 품질 필터: 최소 200자 이상

# ─────────────────────────────────────────────────────────────────
# 파이프라인 설정
# ─────────────────────────────────────────────────────────────────
pipeline:
  fetch_window_hours: 24           # 최신성 필터: 24시간 이내 기사만
  concurrency: 5                   # asyncio Semaphore 병렬 요청 수

# ─────────────────────────────────────────────────────────────────
# 카테고리 정의 (9개 — 단계별 활성화)
# enabled: false → 코드에서 수집·처리 건너뜀
# ─────────────────────────────────────────────────────────────────
categories:
  - key:       "K-Beauty"
    label:     "K-Beauty"
    phase:     "mvp"
    enabled:   true
    style:     "How-to, ingredient explainer, skincare routine guide"
    reference: "Allure"

  - key:       "K-Drama"
    label:     "K-Drama"
    phase:     "mvp"
    enabled:   true
    style:     "Storytelling, review, streaming guide"
    reference: "Entertainment Weekly"

  - key:       "K-Pop"
    label:     "K-Pop"
    phase:     "mvp"
    enabled:   true
    style:     "Breaking news, fan-forward, numbers-first"
    reference: "Billboard"

  - key:       "K-Food"
    label:     "K-Food"
    phase:     "mvp"
    enabled:   true
    style:     "Food intro, rich cultural context"
    reference: "Bon Appétit"

  - key:       "K-Fashion"
    label:     "K-Fashion"
    phase:     "mvp"
    enabled:   true
    style:     "Cool and polished, styling tips"
    reference: "Vogue / Hypebeast"

  - key:       "K-Lifestyle"
    label:     "K-Lifestyle"
    phase:     "mvp"
    enabled:   true
    style:     "Slow and emotive, life tips"
    reference: "Well+Good"

  - key:       "K-Travel"
    label:     "K-Travel"
    phase:     "v1.1"
    enabled:   false
    style:     "Travel guide, K-drama pilgrimage, local food map"
    reference: "Lonely Planet"

  - key:       "K-Sport"
    label:     "K-Sport"
    phase:     "v1.1"
    enabled:   false
    style:     "Match report, player profile, breaking"
    reference: "ESPN"

  - key:       "K-Entertainment"
    label:     "K-Entertainment"
    phase:     "v1.1"
    enabled:   false
    style:     "Variety show, film, OTT review"
    reference: "Variety"

