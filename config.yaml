# Vctr — config.yaml
# ⚠️  SSOT: 카테고리·키워드·컬러·이미지 키워드 모두 여기서만 정의한다.
#    코드·프롬프트에 하드코딩 금지. 변경 시 이 파일만 수정한다.

# ─────────────────────────────────────────────────────────────────
# 사이트 메타
# ─────────────────────────────────────────────────────────────────
site:
  name: "Vctr"
  slogan: "Find your vector."
  description: "Precision AI & SaaS tool reviews for global builders."
  url: "https://vctr.io"
  locale: "en"

# ─────────────────────────────────────────────────────────────────
# LLM 설정
# ─────────────────────────────────────────────────────────────────
llm:
  primary: "gpt-4o"
  fallback: "claude-3-5-sonnet-20241022"
  prompt_version: "v1.0"
  max_articles_per_category: 8
  min_body_length: 200

# ─────────────────────────────────────────────────────────────────
# 파이프라인 설정
# ─────────────────────────────────────────────────────────────────
pipeline:
  fetch_window_hours: 24
  concurrency: 5

# ─────────────────────────────────────────────────────────────────
# 카테고리 정의 (MVP 6개)
# producthunt_topics: ProductHunt GraphQL topic slug 목록
# ─────────────────────────────────────────────────────────────────
categories:
  - key:                "AI Writing"
    label:              "AI Writing"
    phase:              "mvp"
    enabled:            true
    style:              "Benchmark-driven, feature comparison, use-case focused"
    reference:          "The Verge"
    producthunt_topics: ["writing-tools", "artificial-intelligence", "saas"]

  - key:                "AI Image"
    label:              "AI Image"
    phase:              "mvp"
    enabled:            true
    style:              "Visual-first, prompt quality, model comparison"
    reference:          "Ars Technica"
    producthunt_topics: ["design-tools", "artificial-intelligence", "tech"]

  - key:                "Productivity"
    label:              "Productivity"
    phase:              "mvp"
    enabled:            true
    style:              "Workflow-focused, team vs solo, integration-aware"
    reference:          "Notion blog"
    producthunt_topics: ["productivity", "saas", "tech"]

  - key:                "Dev Tools"
    label:              "Dev Tools"
    phase:              "mvp"
    enabled:            true
    style:              "Code-first, latency/accuracy benchmarks, IDE integration"
    reference:          "Stack Overflow blog"
    producthunt_topics: ["developer-tools", "github", "saas"]

  - key:                "No-Code"
    label:              "No-Code"
    phase:              "mvp"
    enabled:            true
    style:              "Builder-friendly, complexity vs flexibility, template quality"
    reference:          "Makerpad"
    producthunt_topics: ["no-code", "website-builder", "saas"]

  - key:                "Marketing"
    label:              "Marketing"
    phase:              "mvp"
    enabled:            true
    style:              "ROI-focused, channel-specific, case-study driven"
    reference:          "HubSpot blog"
    producthunt_topics: ["marketing", "seo", "social-media", "email", "analytics"]

# ─────────────────────────────────────────────────────────────────
# 카테고리 컬러 시스템
# OG 이미지(@vercel/og), UI 배지, 카테고리 필터 배경색에 사용
# ─────────────────────────────────────────────────────────────────
category_colors:
