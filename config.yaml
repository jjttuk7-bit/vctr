# ─────────────────────────────────────────────────────────────────
# 수집 소스
# ─────────────────────────────────────────────────────────────────
sources:
  producthunt:
    enabled:     true
    display:     "ProductHunt"
    api_base:    "https://api.producthunt.com/v2/api/graphql"
    daily_limit: 200

  github_trending:
    enabled:     true
    display:     "GitHub Trending"
    url:         "https://github.com/trending"

  hackernews:
    enabled:          true
    display:          "Hacker News"
    search_base:      "https://hn.algolia.com/api/v1/search"
    min_score:        20      # 최소 포인트 — 너무 낮으면 저품질 포스트 유입
    fetch_window_hours: 72    # PH·GitHub(24h)보다 길게 — Show HN 빈도가 낮음

# ─────────────────────────────────────────────────────────────────
# 알림 채널
# ─────────────────────────────────────────────────────────────────
notifications:
  email:
    provider: "buttondown"
    enabled:  true
  discord:
    enabled:  true
  twitter:
    enabled:  false
