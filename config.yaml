# ─────────────────────────────────────────────────────────────────
image_keywords:
  "AI Writing":
    - "writing workspace laptop"
    - "minimal desk setup"
    - "text editor dark screen"

  "AI Image":
    - "digital art abstract colors"
    - "creative studio lights"
    - "generative design pattern"

  "Productivity":
    - "minimal workspace overhead"
