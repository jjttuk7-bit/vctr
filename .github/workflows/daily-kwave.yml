name: KNow Daily Pipeline

on:
  schedule:
    - cron: '0 23 * * *'   # KST 08:00 = UTC 전날 23:00
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (skip DB save & notifications)'
        type: boolean
        default: false

permissions:
  contents: write   # DB 커밋·푸시 → Vercel 자동 재배포 트리거

jobs:
  pipeline:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run KNow pipeline
        run: |
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            python -m agent.main --dry-run
          else
            python -m agent.main
          fi
        env:
          OPENAI_API_KEY:      ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY:   ${{ secrets.ANTHROPIC_API_KEY }}
          NAVER_CLIENT_ID:     ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
          YOUTUBE_API_KEY:     ${{ secrets.YOUTUBE_API_KEY }}
          BUTTONDOWN_API_KEY:  ${{ secrets.BUTTONDOWN_API_KEY }}
          DISCORD_WEBHOOK:     ${{ secrets.DISCORD_WEBHOOK }}

  # Vercel이 GitHub push를 감지해 자동 재배포
  # → 별도 deploy job 불필요
